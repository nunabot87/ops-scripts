# Stock Server Performance Tuning — applied 2026-04-18
# Reduce swap usage (prefer RAM)
vm.swappiness = 10

# More aggressive dirty page flushing (better for database)
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5

# Increase inotify watches (for file monitoring)
fs.inotify.max_user_watches = 524288
